name: CLA Assistant (reusable)

# Reusable workflow that gates external pull-request contributions on a signed
# Contributor License Agreement, so WayQ Technologies Pvt Ltd can dual-license
# Beekon (source-available + commercial). Called by each Beekon repo's
# .github/workflows/cla.yml. Signatures are stored in the private
# wayqteam/cla-signatures repo via a fine-grained PAT.

on:
  workflow_call:
    secrets:
      PERSONAL_ACCESS_TOKEN:
        required: true

permissions:
  actions: write        # re-run the workflow after a signature comment
  contents: write       # write the signature file
  pull-requests: write  # post the sign-request comment / labels
  statuses: write       # set the "CLA Assistant" commit status that gates merge

jobs:
  cla:
    runs-on: ubuntu-latest
    # Only act on PR events and on the signing comment — never on push/merge_group.
    if: >
      (github.event_name == 'issue_comment' &&
        contains(github.event.comment.body, 'I have read the CLA Document and I hereby sign the CLA')) ||
      github.event_name == 'pull_request_target'
    steps:
      - name: CLA Assistant Lite
        # TODO(before go-live): pin to a release commit SHA per the repo's CI-hardening convention.
        uses: contributor-assistant/github-action@v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}                  # comments/status on THIS repo
          PERSONAL_ACCESS_TOKEN: ${{ secrets.PERSONAL_ACCESS_TOKEN }} # cross-repo write to cla-signatures
        with:
          path-to-signatures: 'signatures/beekon-cla.json'
          path-to-document: 'https://github.com/wayqteam/.github/blob/main/CLA.md'
          remote-repository-name: 'cla-signatures'
          branch: 'main'
          allowlist: 'agnath18K,edwinjzph,*[bot]'
          custom-pr-sign-comment: 'I have read the CLA Document and I hereby sign the CLA'
          custom-notsigned-prcomment: >
            Thank you for your contribution to Beekon. Before we can merge, we need you to sign the
            [Contributor License Agreement](https://github.com/wayqteam/.github/blob/main/CLA.md),
            which lets WayQ Technologies Pvt Ltd offer Beekon under both a source-available and a
            commercial license. Please read it, then comment below with exactly:
          lock-pullrequest-aftermerge: true
